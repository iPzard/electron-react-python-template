<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <!--
      Content Security Policy.

      Production (loadFile in main.js): the CRA-built bundle loads via file://,
      so 'self' covers scripts/styles. 'unsafe-inline' is needed because CRA
      injects a small inline runtime script and inline critical-CSS. connect-src
      allows the renderer to reach Flask at the dynamic dev/prod port (3001–3999)
      on either localhost or 127.0.0.1 — see main.js port handoff.

      Dev mode: webpack-dev-server needs 'unsafe-eval' for HMR. Electron's
      "Insecure Content-Security-Policy" warning therefore fires in dev — it
      is expected and disappears once the app is packaged.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:*; img-src 'self' data:; font-src 'self' data:;"
    />
    <meta
      name="description"
      content="Electron desktop app powered by React and a Python/Flask microservice."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Electron, React & Python App</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->

    <!-- Issue workaround for React v16. -->
    <script>
      // See https://github.com/facebook/create-react-app/issues/10474#issuecomment-811987438
      if (!crossOriginIsolated) SharedArrayBuffer = ArrayBuffer;
    </script>
  </body>
</html>
